name: Feature Request
description: You want something new. Describe the problem first.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        The best requests describe real constraints and expected outcomes.

  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that you cannot do now?
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: Current workaround

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: Describe implementation ideas and tradeoffs.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Simulation script
        - Fixture payload
        - Signature generation
        - Documentation
        - Tooling
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How blocked are you without this?
      options:
        - Completely blocked
        - Significant inconvenience
        - Quality-of-life improvement
    validations:
      required: true
